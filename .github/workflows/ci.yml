name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Rust backend ─────────────────────────────────────────────────────────────
  backend:
    name: Backend (Rust)
    runs-on: ubuntu-latest
    # Only run when backend files change
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.changed_files, 'worldmonitor-core') ||
      contains(github.event.pull_request.changed_files, 'Dockerfile') ||
      contains(github.event.pull_request.changed_files, 'railway.toml')
    defaults:
      run:
        working-directory: worldmonitor-core

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: worldmonitor-core -> target

      - name: Format check
        run: cargo fmt --check

      - name: Check (no build needed)
        run: cargo check --all-targets

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build release binary
        run: cargo build --release

  # ── Next.js frontend ─────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worldmonitor-ui-components

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: worldmonitor-ui-components/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint
        # Warn but don't fail on lint — frontend is evolving fast
        continue-on-error: true

      - name: Build
        run: npm run build
        env:
          RUST_BACKEND_URL: http://localhost:8080

  # ── Docker multi-arch build smoke-test (main branch only) ────────────────────
  docker:
    name: Docker build (${{ matrix.platform }})
    runs-on: ubuntu-latest
    needs: backend
    if: github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        platform: [linux/amd64, linux/arm64]

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for cross-platform build)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (${{ matrix.platform }}, no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: ${{ matrix.platform }}
          push: false
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}

  # ── CI summary ────────────────────────────────────────────────────────────────
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [frontend, docker]
    if: always()
    steps:
      - name: Report status
        run: |
          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend (TypeScript + Build) | ${{ needs.frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker (amd64 + arm64)        | ${{ needs.docker.result }} |" >> $GITHUB_STEP_SUMMARY
