version: '3.8'

# Local development stack — starts both services with hot-reload.
# Usage:
#   GROQ_API_KEY=<key> docker compose up
#   Then open http://localhost:3000 (UI) or http://localhost:8080 (API direct)

services:
  backend:
    build:
      context: ./worldmonitor-core
      dockerfile: Dockerfile
    container_name: wm-backend
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      DATABASE_URL: sqlite:/app/data/worldmonitor.db
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      MAX_ALERTS_FREE: 3
      # Stripe billing — optional; leave unset to run without paid tiers.
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_PRO: ${STRIPE_PRICE_PRO:-}
      STRIPE_PRICE_ENTERPRISE: ${STRIPE_PRICE_ENTERPRISE:-}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      RUST_LOG: info
    volumes:
      - wm-db:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    image: node:20-alpine
    container_name: wm-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    environment:
      RUST_BACKEND_URL: http://backend:8080
      NODE_ENV: development
    volumes:
      - ./worldmonitor-ui-components:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  wm-db:
    driver: local
